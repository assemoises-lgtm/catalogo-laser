<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Corte y grabado láser</title>
<meta name="description" content="Catálogo de piezas de corte y grabado láser. Pide por WhatsApp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --tinta:#211D18;        /* carbón / borde quemado */
    --papel:#FBFAF7;        /* fondo */
    --triplay:#E4D3B0;      /* madera clara */
    --quemado:#7A4E22;      /* café quemado */
    --laser:#E23D28;        /* rojo láser: SOLO líneas de corte y acción */
    --linea:#C7BCA8;
    --radio:2px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Archivo',sans-serif;
    background:var(--papel);
    color:var(--tinta);
    line-height:1.55;
  }
  .mono{font-family:'Space Mono',monospace}

  /* ---------- Header: chasis de la máquina ---------- */
  header{
    background:var(--tinta);
    color:var(--papel);
    padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .brand h1{
    font-weight:900;font-stretch:112%;
    font-size:clamp(1.05rem,2.5vw,1.4rem);
    letter-spacing:.04em;text-transform:uppercase;
  }
  .brand .estado{
    font-family:'Space Mono',monospace;font-size:.62rem;
    color:var(--triplay);letter-spacing:.08em;
    display:flex;align-items:center;gap:6px;
  }
  .estado::before{
    content:"";width:7px;height:7px;border-radius:50%;
    background:var(--laser);
    animation:pulso 1.6s ease-in-out infinite;
  }
  @keyframes pulso{0%,100%{opacity:1}50%{opacity:.25}}
  header .wa-header{
    font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;
    color:var(--tinta);background:var(--triplay);
    text-decoration:none;padding:8px 14px;border-radius:var(--radio);
    white-space:nowrap;
  }

  /* ---------- Hero ---------- */
  .hero{
    max-width:1080px;margin:0 auto;padding:56px 20px 30px;
  }
  .hero .ref{
    font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.14em;
    color:var(--quemado);text-transform:uppercase;margin-bottom:14px;
  }
  .hero h2{
    font-weight:900;font-stretch:82%;
    font-size:clamp(1.9rem,5.4vw,3.4rem);
    line-height:1.04;text-transform:uppercase;letter-spacing:.005em;
    max-width:15ch;
  }
  .hero h2 .corte{
    color:var(--laser);
    text-decoration:underline;
    text-decoration-style:dashed;
    text-decoration-thickness:2px;
    text-underline-offset:7px;
  }
  .hero p{margin-top:16px;max-width:52ch;color:#4C463D;font-size:.98rem}

  /* ---------- Filtros ---------- */
  .filtros{
    max-width:1080px;margin:0 auto;padding:10px 20px 6px;
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .chip{
    font-family:'Space Mono',monospace;font-size:.72rem;
    border:1px solid var(--tinta);background:transparent;color:var(--tinta);
    padding:7px 13px;border-radius:var(--radio);cursor:pointer;
  }
  .chip[aria-pressed="true"]{background:var(--tinta);color:var(--papel)}
  .chip:focus-visible{outline:2px solid var(--laser);outline-offset:2px}

  /* ---------- Grid ---------- */
  .grid{
    max-width:1080px;margin:0 auto;padding:22px 20px 70px;
    display:grid;gap:26px;
    grid-template-columns:repeat(auto-fill,minmax(255px,1fr));
  }

  /* ---------- Tarjeta = hoja de corte ---------- */
  .pieza{
    position:relative;
    background:#fff;
    border:1.5px dashed var(--laser);
    border-radius:var(--radio);
    padding:14px;
    display:flex;flex-direction:column;gap:10px;
  }
  /* marcas de registro en esquinas */
  .pieza::before,.pieza::after,
  .pieza .reg::before,.pieza .reg::after{
    content:"";position:absolute;width:12px;height:12px;
    border-color:var(--tinta);border-style:solid;
  }
  .pieza::before{top:-1px;left:-1px;border-width:1.5px 0 0 1.5px}
  .pieza::after{top:-1px;right:-1px;border-width:1.5px 1.5px 0 0}
  .pieza .reg::before{bottom:-1px;left:-1px;border-width:0 0 1.5px 1.5px}
  .pieza .reg::after{bottom:-1px;right:-1px;border-width:0 1.5px 1.5px 0}

  @media (hover:hover){
    .pieza{transition:transform .18s ease}
    .pieza:hover{transform:translateY(-3px)}
    /* el láser "recorre" la línea de corte */
    .pieza:hover{animation:trazo .5s steps(8) infinite}
  }
  @keyframes trazo{to{border-style:dashed}}
  .pieza:hover{border-style:dashed}

  .pieza .foto{
    aspect-ratio:4/3;width:100%;
    background:
      repeating-linear-gradient(90deg,var(--triplay) 0 3px,#EEDFBE 3px 6px);
    border-radius:var(--radio);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .pieza .foto img{width:100%;height:100%;object-fit:cover;display:block}
  .pieza .foto .sin-foto{
    font-family:'Space Mono',monospace;font-size:.62rem;color:var(--quemado);
    letter-spacing:.1em;text-transform:uppercase;
  }
  .miniaturas{display:flex;gap:6px}
  .mini{
    flex:1;aspect-ratio:1/1;padding:0;border-radius:var(--radio);
    border:1.5px solid var(--linea);background:none;cursor:pointer;overflow:hidden;
  }
  .mini img{width:100%;height:100%;object-fit:cover;display:block;opacity:.6}
  .mini[aria-current="true"]{border-color:var(--laser)}
  .mini[aria-current="true"] img{opacity:1}
  .mini:focus-visible{outline:2px solid var(--laser);outline-offset:2px}
  .pieza .sku-linea{
    display:flex;justify-content:space-between;align-items:center;
    font-family:'Space Mono',monospace;font-size:.64rem;color:var(--quemado);
    letter-spacing:.06em;
  }
  .badge{
    background:var(--triplay);color:var(--tinta);
    padding:2px 7px;border-radius:var(--radio);font-weight:700;
  }
  .pieza h3{
    font-weight:800;font-stretch:95%;font-size:1.02rem;line-height:1.2;
  }
  .pieza .desc{font-size:.84rem;color:#4C463D;flex:1}
  .pieza .specs{
    font-family:'Space Mono',monospace;font-size:.66rem;color:var(--quemado);
    border-top:1px solid var(--linea);padding-top:8px;
    display:flex;justify-content:space-between;gap:8px;
  }
  .pieza .precio{
    font-family:'Space Mono',monospace;font-weight:700;font-size:1.05rem;
  }
  .btn-wa{
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--tinta);color:var(--papel);
    text-decoration:none;font-weight:700;font-size:.85rem;
    padding:11px 12px;border-radius:var(--radio);
  }
  .btn-wa:hover{background:var(--laser)}
  .btn-wa:focus-visible{outline:2px solid var(--laser);outline-offset:2px}
  .btn-wa svg{width:16px;height:16px;fill:currentColor;flex:none}

  .vacio{
    grid-column:1/-1;text-align:center;padding:50px 0;
    font-family:'Space Mono',monospace;font-size:.8rem;color:var(--quemado);
  }

  footer{
    background:var(--tinta);color:var(--triplay);
    padding:26px 20px;text-align:center;
    font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.06em;
  }
  footer a{color:var(--papel)}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1 id="nombre-negocio">—</h1>
    <span class="estado mono">LÁSER EN LÍNEA</span>
  </div>
  <a class="wa-header" id="wa-general" href="#" target="_blank" rel="noopener">PEDIR POR WHATSAPP →</a>
</header>

<section class="hero">
  <p class="ref" id="ref-catalogo">CATÁLOGO</p>
  <h2>Piezas <span class="corte">cortadas a láser</span>, hechas a tu medida</h2>
  <p id="tagline"></p>
</section>

<nav class="filtros" id="filtros" aria-label="Filtrar por categoría"></nav>

<main class="grid" id="grid" aria-live="polite"></main>

<footer>
  <span id="pie">Hecho en México · Pedidos por WhatsApp</span>
</footer>

<script>
const WA_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.04 2a9.9 9.9 0 0 0-8.5 14.96L2 22l5.2-1.5A9.9 9.9 0 1 0 12.04 2Zm5.8 14.06c-.24.68-1.4 1.3-1.94 1.35-.5.04-1.13.06-1.82-.12a16 16 0 0 1-1.65-.6c-2.9-1.26-4.8-4.2-4.94-4.4-.15-.19-1.18-1.57-1.18-3s.75-2.13 1.02-2.42c.26-.29.58-.36.77-.36h.55c.18 0 .42-.07.65.5.24.57.8 1.97.88 2.11.07.15.12.32.02.51-.1.2-.15.31-.29.48-.15.17-.31.39-.44.52-.15.14-.3.3-.13.6.17.28.75 1.23 1.6 2 1.1.98 2.03 1.28 2.32 1.43.29.14.46.12.63-.07.17-.2.72-.84.92-1.13.19-.29.39-.24.65-.14.27.1 1.7.8 1.99.95.29.14.48.22.55.34.07.12.07.68-.17 1.35Z"/></svg>';

let DATA = null;
let filtro = 'Todo';

fetch('products.json')
  .then(r => r.json())
  .then(d => { DATA = d; iniciar(); })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<p class="vacio">No se pudo cargar products.json — si abriste el archivo localmente, usa un servidor local o súbelo a GitHub Pages.</p>';
  });

function waLink(cfg, p){
  const msg = cfg.mensaje.replace('{nombre}', p.nombre).replace('{sku}', p.sku);
  return 'https://wa.me/' + cfg.whatsapp + '?text=' + encodeURIComponent(msg);
}

function iniciar(){
  const cfg = DATA.config;
  document.getElementById('nombre-negocio').textContent = cfg.nombre;
  document.getElementById('tagline').textContent = cfg.tagline;
  document.title = 'Catálogo · ' + cfg.nombre;
  document.getElementById('wa-general').href =
    'https://wa.me/' + cfg.whatsapp + '?text=' + encodeURIComponent('¡Hola! Vi su catálogo y quiero más información.');
  document.getElementById('pie').textContent = cfg.nombre + ' · Hecho en México · Pedidos por WhatsApp';

  const cats = ['Todo', ...new Set(DATA.productos.map(p => p.categoria))];
  const nav = document.getElementById('filtros');
  nav.innerHTML = cats.map(c =>
    `<button class="chip" aria-pressed="${c===filtro}" data-cat="${c}">${c.toUpperCase()}</button>`
  ).join('');
  nav.addEventListener('click', e => {
    const b = e.target.closest('.chip'); if(!b) return;
    filtro = b.dataset.cat;
    nav.querySelectorAll('.chip').forEach(x => x.setAttribute('aria-pressed', x===b));
    pintar();
  });
  pintar();
}

function pintar(){
  const cfg = DATA.config;
  const lista = DATA.productos.filter(p => filtro==='Todo' || p.categoria===filtro);
  document.getElementById('ref-catalogo').textContent =
    'CATÁLOGO · ' + lista.length + ' PIEZA' + (lista.length===1?'':'S');
  const grid = document.getElementById('grid');
  if(!lista.length){
    grid.innerHTML = '<p class="vacio">Sin piezas en esta categoría todavía.</p>';
    return;
  }
  grid.innerHTML = lista.map(p => {
    const imgs = (p.imagenes && p.imagenes.length) ? p.imagenes : [p.imagen];
    return `
    <article class="pieza">
      <span class="reg" aria-hidden="true"></span>
      <div class="foto">
        <img src="${imgs[0]}" alt="${p.nombre}" loading="lazy"
             onerror="this.remove();this.parentElement.insertAdjacentHTML('beforeend','<span class=&quot;sin-foto&quot;>FOTO PRÓXIMAMENTE</span>')">
      </div>
      ${imgs.length > 1 ? `<div class="miniaturas">
        ${imgs.map((src,i) => `<button type="button" class="mini" data-src="${src}" aria-current="${i===0}" aria-label="Ver foto ${i+1} de ${p.nombre}"><img src="${src}" loading="lazy"></button>`).join('')}
      </div>` : ''}
      <div class="sku-linea">
        <span>SKU ${p.sku}</span>
        ${p.personalizable ? '<span class="badge">PERSONALIZABLE</span>' : ''}
      </div>
      <h3>${p.nombre}</h3>
      <p class="desc">${p.descripcion}</p>
      <div class="specs">
        <span>${p.material}</span>
        <span class="precio">$${p.precio.toLocaleString('es-MX')} ${cfg.moneda}</span>
      </div>
      <a class="btn-wa" href="${waLink(cfg,p)}" target="_blank" rel="noopener">
        ${WA_SVG} Pedir por WhatsApp
      </a>
    </article>
  `;
  }).join('');

  grid.querySelectorAll('.mini').forEach(btn => {
    btn.addEventListener('click', () => {
      const foto = btn.closest('.pieza').querySelector('.foto img');
      if(foto) foto.src = btn.dataset.src;
      btn.parentElement.querySelectorAll('.mini').forEach(m => m.setAttribute('aria-current', m===btn));
    });
  });
}
</script>
</body>
</html>
